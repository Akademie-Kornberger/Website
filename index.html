<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Tobi | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Playfair+Display:italic,wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* Direkt-Fix für den Insta-Tag, falls das CSS klemmt */
        .insta-tag {
            display: flex !important;
            align-items: center;
            gap: 8px;
            color: #9c846d !important; /* Mokka-Gold */
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            position: fixed; /* Fixiert ihn am Screen */
            right: 20px;
            bottom: 20px;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s;
        }
        .insta-tag:hover {
            color: #ffffff !important;
        }
        .insta-tag svg {
            stroke: #9c846d;
        }
        .insta-tag:hover svg {
            stroke: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hero-bg">
        <img src="tobi-portrait.png" alt="Background">
        <div class="overlay-gradient"></div>
    </div>

    <div class="main-wrapper">
        <nav class="navbar">
            <div class="logo">COACH <span class="accent-gold">TOBI</span></div>
            <div class="menu-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
            </div>
        </nav>

        <main class="hero">
            <div class="hero-content">
                <span class="subtitle">Personal Coaching</span>
                <h1>Fortschritt ist<br><span class="italic"><span class="accent-gold">kein</span> Zufall.</span></h1>
                <div class="hero-btn-container">
                    <a href="termin.html" class="main-button">Jetzt starten</a>
                </div>
            </div>
        </main>

        <a href="https://instagram.com/kornberger.tobias" target="_blank" class="insta-tag">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            @kornberger.tobias
        </a>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-nav-links">
            <a href="index.html" class="menu-link" onclick="toggleMenu()">Home</a>
            <a href="ueber-mich.html" class="menu-link" onclick="toggleMenu()">Über mich</a>
            <a href="programme.html" class="menu-link" onclick="toggleMenu()">Pakete</a>
            <a href="impressum.html" class="menu-link-small" onclick="toggleMenu()">Impressum</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menuOverlay').classList.toggle('open');
            // Verhindert das Scrollen im Hintergrund, wenn Menü offen ist
            if (document.getElementById('menuOverlay').classList.contains('open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
